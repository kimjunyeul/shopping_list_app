<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 24px;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 12px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #718096;
      margin-bottom: 12px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 13px;
      cursor: pointer;
      padding: 0;
    }

    .clear-btn:hover {
      text-decoration: underline;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7fafc;
    }

    li + li {
      border-top: 1px solid #edf2f7;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #2d3748;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #a0aec0;
      font-size: 14px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .loading {
      text-align: center;
      padding: 40px 0;
      color: #a0aec0;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑리스트</h1>
    <p class="subtitle" id="date"></p>

    <div class="input-row">
      <input type="text" id="item-input" placeholder="아이템 입력..." />
      <button onclick="addItem()">+</button>
    </div>

    <div class="stats">
      <span id="stats-text"></span>
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none;">
      <div class="empty-icon">🛒</div>
      <div>리스트가 비어있습니다</div>
    </div>
    <div class="loading" id="loading">불러오는 중...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://rualaoeacsajixopbqdb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1YWxhb2VhY3Nhaml4b3BicWRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjM0NzQsImV4cCI6MjA5MDQ5OTQ3NH0.fr5tNZw47QxrSFyodu3okVk_4yg-k6KT-jLFTYgewrI';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        console.error('데이터 로드 실패:', error);
        return;
      }

      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('item-input');
      const text = input.value.trim();
      if (!text) return;

      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();

      if (error) {
        console.error('추가 실패:', error);
        return;
      }

      items.push(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);

      if (error) {
        console.error('업데이트 실패:', error);
        return;
      }

      item.checked = !item.checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        console.error('삭제 실패:', error);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        console.error('삭제 실패:', error);
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats-text');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
      } else {
        empty.style.display = 'none';
        const done = items.filter(i => i.checked).length;
        stats.textContent = `${done} / ${items.length} 완료`;

        items.forEach(item => {
          const li = document.createElement('li');
          if (item.checked) li.classList.add('checked');

          li.innerHTML = `
            <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle('${item.id}')">
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="delete-btn" onclick="deleteItem('${item.id}')">✕</button>
          `;
          list.appendChild(li);
        });
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('item-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    document.getElementById('date').textContent =
      new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

    loadItems();
  </script>
</body>
</html>
